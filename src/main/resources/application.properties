# Application running port
server.port=8080
server.error.include-message=always
server.error.include-stacktrace=always

# ===============================
# DATABASE CONFIGURATION (MySQL)
# ===============================
# Update the username and password to match your local MySQL configuration
spring.datasource.url=jdbc:mysql://localhost:3306/skillswap_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=student

# Hibernate Properties (Creates the tables automatically based on the Entity classes)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# THYMELEAF CONFIGURATION
# ===============================
spring.thymeleaf.cache=false

# ===============================
# OAUTH2 GMAIL LOGIN (Placeholder)
# ===============================
# Replace these with your actual google OAuth client details when ready
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=profile,email
